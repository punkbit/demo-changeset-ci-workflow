name: 📚 Test pull request comment

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  HUSKY: 0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate GitHub workflow token
        id: gh-workflow-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.WORKFLOW_AUTH_PUBLIC_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTH_PUBLIC_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '23.x'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --prebuilt \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$(uuidgen | tr -d '-').test.com" >> $GITHUB_OUTPUT
          echo "Preview deployed to: $DEPLOYMENT_URL"

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 📚 Storybook Preview Deployed

            ✅ Preview URL: ${{ steps.deploy.outputs.url }}

            Built from commit: `${{ github.sha }}`
          message-id: storybook-preview
          repo-token: ${{ steps.gh-workflow-token.outputs.token }}
