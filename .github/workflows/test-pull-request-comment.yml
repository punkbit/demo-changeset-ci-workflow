name: 📚 Test pull request comment

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  HUSKY: 0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: deploy
        run: |
          DEPLOYMENT_URL="$(uuidgen | tr -d '-').test.com"
          echo "url=$(echo $DEPLOYMENT_URL)" >> $GITHUB_OUTPUT
          echo "Preview deployed to: $DEPLOYMENT_URL"

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 📚 Storybook Preview Deployed

            ✅ Preview URL: ${{ steps.deploy.outputs.url }}

            Built from commit: `${{ github.sha }}`
          message-id: storybook-preview
          repo-token: ${{ steps.gh-workflow-token.outputs.token }}
